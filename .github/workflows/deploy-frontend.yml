name: Deploy Frontend to IBM Cloud Code Engine

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine
          ibmcloud plugin install container-registry

      - name: Authenticate with IBM Cloud
        run: |
          ibmcloud login --apikey ${{ secrets.IBM_CLOUD_API_KEY }}
          ibmcloud target -r us-east -g Mutual_POC
          ibmcloud cr login

      - name: Update Code Engine Application
        run: |
          ibmcloud ce project select --name centinela-ARTP
          ibmcloud ce application update \
            --name centinela-artp-webapp \
            --build-source https://github.com/entelDigital-AcademicLabs/centinela-artp-app \
            --build-strategy dockerfile \
            --build-env NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }} \
            --build-env NEXT_PUBLIC_IBM_COS_ENDPOINT=${{ secrets.NEXT_PUBLIC_IBM_COS_ENDPOINT }} \
            --build-env NEXT_PUBLIC_GRAPHQL_API_URL=${{ secrets.NEXT_PUBLIC_GRAPHQL_API_URL }} \
            --build-env NEXT_PUBLIC_COOKIE_DOMAIN=${{ secrets.NEXT_PUBLIC_COOKIE_DOMAIN }} \
            --env AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }} \
            --env AUTH0_ISSUER_BASE_URL=${{ secrets.AUTH0_ISSUER_BASE_URL }} \
            --env AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }} \
            --env AUTH0_CLIENT_SECRET=${{ secrets.AUTH0_CLIENT_SECRET }} \
            --env AUTH0_SECRET=${{ secrets.AUTH0_SECRET }} \
            --env AUTH0_SCOPE=${{ secrets.AUTH0_SCOPE }} \
            --env AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }} \
            --env AUTH0_BASE_URL=${{ secrets.AUTH0_BASE_URL }}